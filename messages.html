<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>طلبات الحجز — Teriaq</title>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a222c;
        --text: #e8eef4;
        --muted: #8b9aad;
        --border: #2a3544;
        --accent: #3d8bfd;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.25rem;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 1rem;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.08);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th,
      td {
        padding: 0.65rem 0.85rem;
        text-align: right;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        background: rgba(0, 0, 0, 0.25);
        font-weight: 600;
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .empty {
        padding: 2rem;
        text-align: center;
        color: var(--muted);
      }
      .err {
        color: #f87171;
        font-size: 0.9rem;
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <h1>طلبات الحجز المحفوظة</h1>
    <p class="sub">
      البيانات من <code>data/messages.json</code> عبر <code>api/messages.php</code>.
      <a href="index.html">العودة للموقع</a>
    </p>
    <div class="toolbar">
      <button type="button" id="refreshBtn">تحديث الآن</button>
      <span id="status" class="sub" style="margin: 0"></span>
    </div>
    <div class="card">
      <div id="wrap"></div>
    </div>
    <script>
      const wrap = document.getElementById("wrap");
      const statusEl = document.getElementById("status");
      const refreshBtn = document.getElementById("refreshBtn");
      /** تحديث تلقائي من السيرفر (ملف JSON عبر PHP) */
      var REFRESH_MS = 10000;

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function render(rows) {
        if (!rows.length) {
          wrap.innerHTML =
            '<p class="empty">لا توجد طلبات بعد. أرسل نموذج الحجز من الصفحة الرئيسية.</p>';
          return;
        }
        const cols = ["at", "patientName", "phone", "service", "consulto", "lang", "id"];
        const headers = {
          at: "الوقت",
          patientName: "الاسم",
          phone: "الهاتف",
          service: "الخدمة",
          consulto: "كونسلتو",
          lang: "اللغة",
          id: "المعرّف",
        };
        let html = "<table><thead><tr>";
        cols.forEach(function (c) {
          html += "<th>" + esc(headers[c] || c) + "</th>";
        });
        html += "</tr></thead><tbody>";
        rows
          .slice()
          .reverse()
          .forEach(function (row) {
            html += "<tr>";
            cols.forEach(function (c) {
              html += "<td>" + esc(row[c] != null ? row[c] : "") + "</td>";
            });
            html += "</tr>";
          });
        html += "</tbody></table>";
        wrap.innerHTML = html;
      }

      function statusLine(count) {
        if (count === 0) {
          return (
            "لا طلبات · تحديث تلقائي كل " +
            REFRESH_MS / 1000 +
            " ثوانٍ"
          );
        }
        var unit = count === 1 ? "طلب" : "طلبات";
        return (
          count +
          " " +
          unit +
          " · تحديث تلقائي كل " +
          REFRESH_MS / 1000 +
          " ثوانٍ"
        );
      }

      function load(opts) {
        opts = opts || {};
        var silent = !!opts.silent;
        if (!silent) {
          statusEl.textContent = "جاري التحميل…";
          statusEl.className = "sub";
        }
        fetch("api/messages.php", { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error(String(r.status));
            return r.json();
          })
          .then(function (data) {
            var rows = Array.isArray(data) ? data : [];
            statusEl.className = "sub";
            statusEl.textContent = statusLine(rows.length);
            render(rows);
          })
          .catch(function () {
            if (!silent) {
              statusEl.innerHTML =
                '<span class="err">تعذر تحميل البيانات. تأكد أن الاستضافة تدعم PHP وأن مجلد data قابل للكتابة.</span>';
              wrap.innerHTML = "";
            }
          });
      }

      refreshBtn.addEventListener("click", function () {
        load({ silent: false });
      });
      load({ silent: false });
      setInterval(function () {
        load({ silent: true });
      }, REFRESH_MS);
    </script>
  </body>
</html>
